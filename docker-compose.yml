# RAG Checker — Docker Compose (Server Mode)
#
# Production: docker compose up -d
#   → postgres + backend (serves static frontend built into image)
#
# Development: docker compose --profile dev up -d
#   → postgres + backend + Vite dev server on :3000
#
# No Redis, no Celery — background tasks use threading.

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragcheck
      POSTGRES_USER: ragcheck
      POSTGRES_PASSWORD: ragcheck_dev
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragcheck"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
      - ./frontend/dist:/app/static
      - ./uploads:/uploads
    environment:
      APP_MODE: server
      DATABASE_URL: postgresql+asyncpg://ragcheck:ragcheck_dev@postgres:5432/ragcheck
      DATABASE_URL_SYNC: postgresql://ragcheck:ragcheck_dev@postgres:5432/ragcheck
      LLM_PROVIDER: gemini
      LLM_MODEL: ${LLM_MODEL:-gemini-3.1-flash-lite-preview}
      LLM_MODEL_CHEAP: ${LLM_MODEL_CHEAP:-gemini-3.1-flash-lite-preview}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-your_key_here}
      EMBEDDING_PROVIDER: local
      EMBEDDING_MODEL_LOCAL: paraphrase-multilingual-MiniLM-L12-v2
      EMBEDDING_DIMENSIONS: "384"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      UPLOAD_DIR: /uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Frontend dev server — ONLY for development (hot reload)
  # Start with: docker compose --profile dev up -d
  frontend-dev:
    profiles: ["dev"]
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["3000:3000"]
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend

volumes:
  postgres_data:
