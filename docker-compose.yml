services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ragcheck
      POSTGRES_USER: ragcheck
      POSTGRES_PASSWORD: ragcheck_dev
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragcheck"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
      - ./uploads:/uploads
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  celery-worker-processing:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo --concurrency=1 --queues=processing
    volumes:
      - ./backend:/app
      - ./uploads:/uploads
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker-evaluation:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --pool=solo --concurrency=1 --queues=evaluation
    volumes:
      - ./backend:/app
      - ./uploads:/uploads
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
