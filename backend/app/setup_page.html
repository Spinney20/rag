<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Checker — Setup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #09090b; color: #fafafa;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .card {
    background: #111114; border: 1px solid #27272a; border-radius: 12px;
    padding: 40px; max-width: 480px; width: 100%;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #06b6d4, #0e7490);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-size: 18px; font-weight: 700; }
  .logo-sub { font-size: 10px; color: #06b6d4; text-transform: uppercase; letter-spacing: 2px; }
  h2 { font-size: 20px; margin-bottom: 8px; }
  .desc { color: #a1a1aa; font-size: 13px; margin-bottom: 24px; }
  label { display: block; font-size: 11px; color: #a1a1aa; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 6px; font-weight: 600; }
  input {
    width: 100%; padding: 10px 14px; background: #09090b; border: 1px solid #27272a;
    border-radius: 8px; color: #fafafa; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #06b6d4; }
  input::placeholder { color: #52525b; }
  .field { margin-bottom: 20px; }
  .hint { font-size: 11px; color: #52525b; margin-top: 4px; }
  .hint a { color: #06b6d4; text-decoration: none; }
  .hint a:hover { text-decoration: underline; }
  button {
    width: 100%; padding: 12px; background: #06b6d4; color: #000; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: filter 0.2s;
  }
  button:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error { color: #ef4444; font-size: 13px; margin-bottom: 16px; display: none; }
  .success { color: #10b981; font-size: 13px; margin-bottom: 16px; display: none; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-text">RAG Checker</div>
      <div class="logo-sub">configurare inițială</div>
    </div>
  </div>

  <h2>Bine ai venit!</h2>
  <p class="desc">Configurează conexiunile pentru a începe verificarea documentelor.</p>

  <div id="error" class="error"></div>
  <div id="success" class="success"></div>

  <form id="setupForm" onsubmit="handleSubmit(event)">
    <div class="field">
      <label>Gemini API Key *</label>
      <input type="text" id="gemini_key" placeholder="AIzaSy..." required>
      <div class="hint">Obține gratuit: <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a></div>
    </div>

    <div class="field">
      <label>Database URL (Neon) *</label>
      <input type="text" id="db_url" placeholder="postgresql://user:pass@ep-name.neon.tech/db?sslmode=require" required>
      <div class="hint">Obține gratuit: <a href="https://neon.tech" target="_blank">neon.tech</a> → Connection Details → Connection String</div>
    </div>

    <button type="submit" id="submitBtn">Salvează și Configurează</button>
  </form>
</div>

<script>
async function handleSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const error = document.getElementById('error');
  const success = document.getElementById('success');

  btn.disabled = true;
  btn.textContent = 'Se salvează...';
  error.style.display = 'none';
  success.style.display = 'none';

  try {
    const res = await fetch('/api/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gemini_api_key: document.getElementById('gemini_key').value.trim(),
        database_url: document.getElementById('db_url').value.trim(),
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Setup failed');

    success.textContent = '✅ ' + data.message;
    success.style.display = 'block';
    btn.textContent = 'Configurare completă!';
  } catch (err) {
    error.textContent = err.message;
    error.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Salvează și Configurează';
  }
}
</script>
</body>
</html>
