<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RAG Checker — Verificare Conformitate PT/CS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   RAG Checker — design tokens
   Dark cinematic terminal. Graphite canvas, amber accent,
   desaturated semantic verdicts.
   ============================================================ */

:root {
  /* Graphite canvas — warm neutral-dark, not pure black */
  --bg-0:      #0a0b0d;       /* page */
  --bg-1:      #0f1114;       /* panel */
  --bg-2:      #14171c;       /* elevated */
  --bg-3:      #1a1e24;       /* input / hover */
  --bg-glass:  rgba(18, 21, 26, 0.72);
  --bg-glass-2:rgba(22, 26, 32, 0.82);

  /* Hairlines — low-contrast, structural */
  --line-0:    rgba(255,255,255,0.06);
  --line-1:    rgba(255,255,255,0.10);
  --line-2:    rgba(255,255,255,0.16);
  --line-3:    rgba(255,255,255,0.24);

  /* Ink */
  --ink-0:     #f4f2ed;       /* warm off-white */
  --ink-1:     #d6d2c9;
  --ink-2:     #9a978f;
  --ink-3:     #6b6a65;
  --ink-4:     #46464a;

  /* Amber accent — muted, filmic */
  --amber:     oklch(0.80 0.13 75);
  --amber-dim: oklch(0.70 0.11 75);
  --amber-ink: oklch(0.92 0.08 80);
  --amber-bg:  color-mix(in oklch, var(--amber) 14%, transparent);
  --amber-line:color-mix(in oklch, var(--amber) 40%, transparent);

  /* Desaturated semantic verdicts */
  --conform:       oklch(0.74 0.07 145);  /* sage */
  --conform-bg:    color-mix(in oklch, oklch(0.74 0.07 145) 14%, transparent);
  --conform-line:  color-mix(in oklch, oklch(0.74 0.07 145) 38%, transparent);

  --neconform:     oklch(0.64 0.11 20);   /* oxblood */
  --neconform-bg:  color-mix(in oklch, oklch(0.64 0.11 20) 16%, transparent);
  --neconform-line:color-mix(in oklch, oklch(0.64 0.11 20) 42%, transparent);

  --partial:       oklch(0.76 0.10 70);   /* ochre */
  --partial-bg:    color-mix(in oklch, oklch(0.76 0.10 70) 14%, transparent);
  --partial-line:  color-mix(in oklch, oklch(0.76 0.10 70) 40%, transparent);

  --insuf:         oklch(0.66 0.02 250);  /* stone */
  --insuf-bg:      color-mix(in oklch, oklch(0.66 0.02 250) 14%, transparent);
  --insuf-line:    color-mix(in oklch, oklch(0.66 0.02 250) 38%, transparent);

  /* Type */
  --ff-sans: 'Inter Tight', system-ui, -apple-system, sans-serif;
  --ff-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --ff-serif:'Source Serif 4', 'Source Serif Pro', Georgia, serif;

  /* Density */
  --row-h: 44px;
  --pad-x: 24px;
  --pad-y: 18px;

  /* Shadows — deep, tight, not fluffy */
  --shadow-1: 0 1px 0 rgba(255,255,255,0.03) inset, 0 6px 20px -12px rgba(0,0,0,0.6);
  --shadow-2: 0 1px 0 rgba(255,255,255,0.04) inset, 0 12px 30px -18px rgba(0,0,0,0.7);

  /* Motion */
  --ease: cubic-bezier(.2,.8,.2,1);
  --dur:  150ms;
}

[data-density="compact"] {
  --row-h: 36px;
  --pad-x: 18px;
  --pad-y: 12px;
}

/* ============================================================
   Reset / base
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html, body, #root { height: 100%; }
body {
  margin: 0;
  background: var(--bg-0);
  color: var(--ink-0);
  font-family: var(--ff-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
  letter-spacing: -0.005em;
  overflow: hidden;
}

/* Subtle vignette so edges don't feel flat */
body::before {
  content: "";
  position: fixed; inset: 0;
  pointer-events: none;
  background:
    radial-gradient(1200px 800px at 20% 10%, rgba(255, 180, 80, 0.035), transparent 60%),
    radial-gradient(1000px 700px at 100% 100%, rgba(120, 160, 220, 0.025), transparent 55%);
  z-index: 0;
}

#particle-bg {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  opacity: 0.85;
}

#root {
  position: relative;
  z-index: 1;
}

button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
a { color: inherit; text-decoration: none; }
input, textarea, select { font: inherit; color: inherit; }

/* Focus */
:focus-visible {
  outline: 1px solid var(--amber);
  outline-offset: 2px;
  border-radius: 2px;
}

/* Scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  border: 2px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover { background-color: rgba(255,255,255,0.16); background-clip: padding-box;}

/* ============================================================
   Typographic utilities
   ============================================================ */
.mono { font-family: var(--ff-mono); font-feature-settings: "zero","ss01"; }
.serif { font-family: var(--ff-serif); }
.eyebrow {
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 500;
}
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
.h1 { font-family: var(--ff-sans); font-weight: 500; font-size: 32px; letter-spacing: -0.02em; line-height: 1.1; color: var(--ink-0); }
.h2 { font-family: var(--ff-sans); font-weight: 500; font-size: 22px; letter-spacing: -0.015em; line-height: 1.2; color: var(--ink-0); }
.h3 { font-family: var(--ff-sans); font-weight: 500; font-size: 15px; letter-spacing: -0.005em; color: var(--ink-0); }
.label { font-family: var(--ff-mono); font-size: 11px; color: var(--ink-2); letter-spacing: 0.04em; }
.muted { color: var(--ink-2); }
.dim   { color: var(--ink-3); }

/* Data typography — standards, codes, numbers */
.code {
  font-family: var(--ff-mono);
  font-size: 12px;
  color: var(--ink-1);
  background: rgba(255,255,255,0.04);
  padding: 1px 6px;
  border-radius: 3px;
  border: 1px solid var(--line-0);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.code.amber { color: var(--amber-ink); border-color: var(--amber-line); background: var(--amber-bg); }

/* ============================================================
   Layout shell
   ============================================================ */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  height: 100vh;
  width: 100vw;
}

.sidebar {
  background: linear-gradient(180deg, rgba(14,16,19,0.92), rgba(10,11,13,0.94));
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-right: 1px solid var(--line-0);
  display: flex; flex-direction: column;
  padding: 18px 0 12px;
  z-index: 2;
}

.brand {
  display: flex; align-items: center; gap: 10px;
  padding: 2px 20px 22px;
  border-bottom: 1px solid var(--line-0);
  margin-bottom: 14px;
}
.brand-mark {
  width: 26px; height: 26px; border-radius: 6px;
  background: linear-gradient(135deg, var(--amber) 0%, oklch(0.58 0.13 50) 100%);
  position: relative;
  box-shadow: 0 0 0 1px var(--amber-line), 0 0 22px -4px var(--amber-bg);
}
.brand-mark::after {
  content: ""; position: absolute; inset: 5px;
  background: var(--bg-0);
  border-radius: 3px;
  background-image:
    radial-gradient(circle at 30% 30%, var(--amber-ink) 1.3px, transparent 1.5px),
    radial-gradient(circle at 70% 40%, var(--amber-ink) 1.3px, transparent 1.5px),
    radial-gradient(circle at 50% 75%, var(--amber-ink) 1.3px, transparent 1.5px),
    linear-gradient(45deg, var(--amber) 0%, transparent 50%);
  background-size: 100% 100%;
}
.brand-name { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
.brand-sub  { font-family: var(--ff-mono); font-size: 9.5px; color: var(--ink-3); letter-spacing: 0.15em; text-transform: uppercase; }

.nav-section { padding: 10px 12px 4px; }
.nav-section-title {
  font-family: var(--ff-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 8px 10px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 5px;
  color: var(--ink-1);
  font-size: 13px;
  cursor: pointer;
  transition: background var(--dur) var(--ease), color var(--dur) var(--ease);
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.035); color: var(--ink-0); }
.nav-item.active {
  background: rgba(255,255,255,0.05);
  color: var(--ink-0);
}
.nav-item.active::before {
  content: ""; position: absolute; left: -12px; top: 10px; bottom: 10px;
  width: 2px; background: var(--amber); border-radius: 2px;
}
.nav-item .icon { color: var(--ink-2); flex: 0 0 auto; }
.nav-item.active .icon { color: var(--amber); }
.nav-item .kbd { margin-left: auto; font-family: var(--ff-mono); font-size: 10px; color: var(--ink-3); }

.sidebar-footer {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--line-0);
  display: flex; flex-direction: column; gap: 8px;
}
.user-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 4px;
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  background: linear-gradient(135deg, #3a3a3f, #1f1f24);
  border: 1px solid var(--line-2);
  display: grid; place-items: center;
  font-family: var(--ff-mono); font-size: 11px; color: var(--ink-1);
}

/* Main column */
.main {
  position: relative;
  display: flex; flex-direction: column;
  min-width: 0;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  height: 52px;
  display: flex; align-items: center; gap: 14px;
  padding: 0 28px;
  border-bottom: 1px solid var(--line-0);
  background: var(--bg-glass);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 3;
}
.breadcrumb {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--ff-mono); font-size: 11.5px; color: var(--ink-2);
  letter-spacing: 0.02em;
}
.breadcrumb a:hover { color: var(--ink-0); }
.breadcrumb .sep { color: var(--ink-4); }
.breadcrumb .cur { color: var(--ink-0); }

.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

.status-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 4px 10px;
  border: 1px solid var(--line-1);
  border-radius: 999px;
  background: rgba(255,255,255,0.02);
  font-family: var(--ff-mono);
  font-size: 10.5px;
  color: var(--ink-1);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); }
.status-dot.live { background: var(--amber); box-shadow: 0 0 0 3px var(--amber-bg); animation: pulse 2s ease-in-out infinite; }
.status-dot.ok   { background: var(--conform); }
.status-dot.warn { background: var(--partial); }
.status-dot.err  { background: var(--neconform); }

@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.45; }
}

/* Scroll area */
.scroll {
  flex: 1 1 auto;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-gutter: stable;
}

.page {
  max-width: 1240px;
  margin: 0 auto;
  padding: 36px 36px 80px;
}

/* ============================================================
   Surfaces
   ============================================================ */
.panel {
  background: var(--bg-glass);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-1);
  border-radius: 8px;
  box-shadow: var(--shadow-1);
}
.panel-pad { padding: var(--pad-y) var(--pad-x); }

.panel-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--line-0);
}

.divider { height: 1px; background: var(--line-0); margin: 0; border: 0; }

/* ============================================================
   Buttons
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 0 14px;
  height: 34px;
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0.01em;
  border: 1px solid var(--line-1);
  background: rgba(255,255,255,0.02);
  color: var(--ink-0);
  border-radius: 5px;
  transition: all var(--dur) var(--ease);
  white-space: nowrap;
}
.btn:hover { border-color: var(--line-2); background: rgba(255,255,255,0.05); }
.btn:active { transform: translateY(1px); }
.btn.sm { height: 28px; padding: 0 10px; font-size: 11.5px; border-radius: 4px; }
.btn.lg { height: 42px; padding: 0 20px; font-size: 13.5px; }
.btn .kbd { font-family: var(--ff-mono); font-size: 10px; color: var(--ink-3); border: 1px solid var(--line-1); border-radius: 3px; padding: 1px 5px; margin-left: 6px; }

.btn-primary {
  background: linear-gradient(180deg, var(--amber) 0%, var(--amber-dim) 100%);
  border-color: color-mix(in oklch, var(--amber) 70%, transparent);
  color: #16100a;
  font-weight: 600;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2) inset, 0 0 22px -6px var(--amber-bg), 0 1px 0 rgba(255,255,255,0.35) inset;
}
.btn-primary:hover {
  border-color: color-mix(in oklch, var(--amber) 90%, transparent);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.2) inset, 0 0 30px -4px color-mix(in oklch, var(--amber) 40%, transparent), 0 1px 0 rgba(255,255,255,0.4) inset;
}
.btn-ghost { background: transparent; border-color: transparent; color: var(--ink-1); }
.btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--ink-0); border-color: var(--line-0); }

.btn-danger {
  border-color: var(--neconform-line);
  color: var(--neconform);
}
.btn-danger:hover { background: var(--neconform-bg); }

.icon-btn {
  width: 30px; height: 30px;
  display: grid; place-items: center;
  border-radius: 5px;
  color: var(--ink-2);
  border: 1px solid transparent;
  transition: all var(--dur) var(--ease);
}
.icon-btn:hover { background: rgba(255,255,255,0.05); color: var(--ink-0); border-color: var(--line-0); }

/* ============================================================
   Badges / pills
   ============================================================ */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  height: 22px;
  padding: 0 8px;
  border-radius: 4px;
  border: 1px solid var(--line-1);
  background: rgba(255,255,255,0.02);
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-1);
  white-space: nowrap;
}
.badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--ink-3); }

/* Verdict colors */
.verdict-conform    { color: var(--conform);    border-color: var(--conform-line);    background: var(--conform-bg); }
.verdict-conform    .dot { background: var(--conform); }
.verdict-neconform  { color: oklch(0.78 0.12 20); border-color: var(--neconform-line); background: var(--neconform-bg); }
.verdict-neconform  .dot { background: var(--neconform); }
.verdict-partial    { color: var(--partial);    border-color: var(--partial-line);    background: var(--partial-bg); }
.verdict-partial    .dot { background: var(--partial); }
.verdict-insuf      { color: var(--ink-1);      border-color: var(--insuf-line);      background: var(--insuf-bg); }
.verdict-insuf      .dot { background: var(--insuf); }

.badge-amber { color: var(--amber-ink); border-color: var(--amber-line); background: var(--amber-bg); }
.badge-amber .dot { background: var(--amber); }

/* Priority */
.prio-obligatoriu  { color: oklch(0.78 0.12 20); border-color: var(--neconform-line); background: var(--neconform-bg); }
.prio-recomandat   { color: var(--partial);    border-color: var(--partial-line);    background: var(--partial-bg); }
.prio-optional     { color: var(--ink-1);       }
.prio-informativ   { color: var(--ink-2);       }

/* ============================================================
   Form
   ============================================================ */
.input, .textarea {
  width: 100%;
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--line-1);
  border-radius: 5px;
  padding: 9px 12px;
  font-size: 13px;
  color: var(--ink-0);
  transition: border-color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.input:hover, .textarea:hover { border-color: var(--line-2); }
.input:focus, .textarea:focus {
  border-color: var(--amber-line);
  background: rgba(255,255,255,0.03);
  outline: none;
  box-shadow: 0 0 0 3px var(--amber-bg);
}
.textarea { resize: vertical; min-height: 72px; font-family: inherit; }

label.field { display: flex; flex-direction: column; gap: 6px; }
label.field .label { margin-bottom: 2px; }

/* ============================================================
   Tables
   ============================================================ */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.table th {
  text-align: left;
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 10px 14px;
  border-bottom: 1px solid var(--line-1);
  font-weight: 500;
}
.table td {
  padding: 14px;
  border-bottom: 1px solid var(--line-0);
  vertical-align: middle;
}
.table tr { transition: background var(--dur) var(--ease); }
.table tbody tr:hover { background: rgba(255,255,255,0.02); cursor: pointer; }
.table tbody tr:last-child td { border-bottom: 0; }

/* ============================================================
   Progress / meters
   ============================================================ */
.meter {
  height: 4px;
  width: 100%;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.meter > span {
  display: block;
  height: 100%;
  background: var(--amber);
  border-radius: 2px;
  transition: width 400ms var(--ease);
  box-shadow: 0 0 12px -2px var(--amber-bg);
}
.meter.tall { height: 6px; }

/* Stacked bar for verdict distribution */
.stackbar {
  display: flex; height: 6px;
  width: 100%; border-radius: 3px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
}
.stackbar > span { height: 100%; display: block; }

/* ============================================================
   Stepper (pipeline)
   ============================================================ */
.stepper {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.step {
  position: relative;
  padding: 18px 22px;
  border: 1px solid var(--line-1);
  border-right: 0;
  background: rgba(255,255,255,0.015);
}
.step:first-child { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
.step:last-child  { border-top-right-radius: 8px; border-bottom-right-radius: 8px; border-right: 1px solid var(--line-1); }

.step-num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--line-2);
  font-family: var(--ff-mono); font-size: 11px;
  color: var(--ink-2);
}
.step.done .step-num { background: var(--conform-bg); border-color: var(--conform-line); color: var(--conform); }
.step.active .step-num { background: var(--amber-bg); border-color: var(--amber-line); color: var(--amber); }
.step.active { background: linear-gradient(180deg, var(--amber-bg), transparent 80%); }
.step-label { font-size: 11px; font-family: var(--ff-mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); margin-top: 10px; }
.step-title { font-size: 14px; color: var(--ink-0); margin-top: 6px; font-weight: 500; }
.step-sub   { font-size: 12px; color: var(--ink-2); margin-top: 4px; }

.step-connector {
  position: absolute; right: -1px; top: 50%; width: 0;
}

/* ============================================================
   Pull-quote evidence
   ============================================================ */
.quote {
  position: relative;
  padding: 18px 22px 18px 26px;
  border-left: 2px solid var(--amber);
  background: linear-gradient(90deg, var(--amber-bg), transparent 60%);
  border-radius: 0 6px 6px 0;
  margin: 14px 0;
}
.quote .quote-mark {
  position: absolute; left: 8px; top: 6px;
  font-family: var(--ff-serif);
  font-size: 36px;
  line-height: 1;
  color: var(--amber);
  opacity: 0.4;
}
.quote-body {
  font-family: var(--ff-serif);
  font-size: 17px;
  line-height: 1.55;
  color: var(--ink-0);
  font-weight: 400;
  letter-spacing: 0;
  font-style: normal;
}
.quote-cite {
  margin-top: 12px;
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink-2);
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.quote-cite a { color: var(--amber-ink); border-bottom: 1px dashed var(--amber-line); padding-bottom: 1px; }
.quote-cite a:hover { color: var(--amber); }

/* ============================================================
   KPI tile
   ============================================================ */
.kpi {
  padding: 18px 20px;
  border: 1px solid var(--line-1);
  border-radius: 8px;
  background: var(--bg-glass);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  position: relative;
  overflow: hidden;
}
.kpi .eyebrow { margin-bottom: 10px; }
.kpi .big {
  font-family: var(--ff-sans);
  font-weight: 500;
  font-size: 30px;
  letter-spacing: -0.02em;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.kpi .big .unit { font-size: 16px; color: var(--ink-3); margin-left: 2px; font-family: var(--ff-mono); }
.kpi .sub { margin-top: 8px; font-size: 12px; color: var(--ink-2); }

/* ============================================================
   Misc
   ============================================================ */
.pip-row { display: flex; align-items: center; gap: 8px; }
.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  font-family: var(--ff-mono); font-size: 10.5px;
  min-width: 18px; height: 18px; padding: 0 5px;
  border: 1px solid var(--line-2);
  border-bottom-width: 2px;
  border-radius: 3px;
  color: var(--ink-2);
  background: rgba(255,255,255,0.03);
}

.dropzone {
  border: 1px dashed var(--line-2);
  border-radius: 8px;
  background: rgba(255,255,255,0.015);
  padding: 22px;
  transition: all var(--dur) var(--ease);
  cursor: pointer;
  position: relative;
}
.dropzone:hover { border-color: var(--amber-line); background: var(--amber-bg); }
.dropzone.filled { border-style: solid; border-color: var(--line-1); background: rgba(255,255,255,0.02); cursor: default; }
.dropzone.filled:hover { border-color: var(--line-1); background: rgba(255,255,255,0.02); }

.filebar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  border: 1px solid var(--line-1);
  border-radius: 5px;
  background: rgba(255,255,255,0.02);
  margin-top: 10px;
}

.hint {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px;
  background: var(--amber-bg);
  border: 1px solid var(--amber-line);
  border-radius: 6px;
  color: var(--ink-1);
  font-size: 12.5px;
}
.hint .icon { color: var(--amber); flex: 0 0 auto; margin-top: 1px; }

.callout {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px;
  border: 1px solid var(--line-1);
  border-left: 2px solid var(--ink-3);
  border-radius: 0 6px 6px 0;
  background: rgba(255,255,255,0.02);
  font-size: 12.5px;
  color: var(--ink-1);
}
.callout.warn { border-left-color: var(--partial); background: var(--partial-bg); color: var(--ink-0); border-color: var(--partial-line); }
.callout.err  { border-left-color: var(--neconform); background: var(--neconform-bg); color: var(--ink-0); border-color: var(--neconform-line); }

/* ============================================================
   Tabs
   ============================================================ */
.tabs {
  display: inline-flex;
  border: 1px solid var(--line-1);
  border-radius: 6px;
  padding: 3px;
  background: rgba(255,255,255,0.02);
}
.tab {
  padding: 6px 12px;
  border-radius: 4px;
  font-size: 12px;
  color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 8px;
  transition: all var(--dur) var(--ease);
}
.tab:hover { color: var(--ink-0); }
.tab.active { background: rgba(255,255,255,0.06); color: var(--ink-0); box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset; }
.tab .count {
  font-family: var(--ff-mono); font-size: 10.5px;
  padding: 1px 6px; border-radius: 3px;
  background: rgba(255,255,255,0.05); color: var(--ink-2);
}
.tab.active .count { color: var(--ink-0); }

/* ============================================================
   Requirement / eval card
   ============================================================ */
.req-card {
  border: 1px solid var(--line-1);
  border-radius: 6px;
  background: rgba(255,255,255,0.015);
  overflow: hidden;
  transition: border-color var(--dur) var(--ease);
}
.req-card:hover { border-color: var(--line-2); }
.req-head {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  cursor: pointer;
}
.req-body {
  padding: 2px 18px 20px;
  border-top: 1px solid var(--line-0);
  font-size: 13px;
  color: var(--ink-1);
  line-height: 1.6;
}
.req-id {
  font-family: var(--ff-mono);
  font-size: 11px;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  min-width: 72px;
}
.req-text { flex: 1; font-size: 13.5px; color: var(--ink-0); }

/* ============================================================
   Tweaks panel
   ============================================================ */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px;
  width: 280px;
  background: var(--bg-glass-2);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--line-2);
  border-radius: 10px;
  box-shadow: 0 20px 50px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.02) inset;
  z-index: 100;
  font-size: 12.5px;
  overflow: hidden;
}
.tweaks-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line-1);
  font-family: var(--ff-mono);
  font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--ink-2);
}
.tweaks-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.tweak-row { display: flex; flex-direction: column; gap: 6px; }
.tweak-row .label { font-family: var(--ff-mono); font-size: 10.5px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; }
.swatch-row { display: flex; gap: 6px; }
.swatch {
  width: 26px; height: 26px; border-radius: 5px;
  border: 1px solid var(--line-2); cursor: pointer;
  transition: transform var(--dur) var(--ease);
}
.swatch:hover { transform: translateY(-1px); }
.swatch.active { box-shadow: 0 0 0 2px var(--amber-line); }
.seg { display: flex; border: 1px solid var(--line-1); border-radius: 5px; overflow: hidden; }
.seg button { flex: 1; padding: 5px 8px; font-size: 11px; color: var(--ink-2); border-right: 1px solid var(--line-1); }
.seg button:last-child { border-right: 0; }
.seg button.active { background: rgba(255,255,255,0.06); color: var(--ink-0); }
.seg button:hover { color: var(--ink-0); }

/* Animations */
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
.fadein { animation: fadein 220ms var(--ease) both; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

<body>
  <canvas id="particle-bg" aria-hidden="true"></canvas>
  <div id="root"></div>

  <script>
    // ---- TWEAKS persisted block (host rewrites this on set_keys) ----
    window.__TWEAKS__ = /*EDITMODE-BEGIN*/{
      "accentHue": 75,
      "density": "comfortable",
      "particleIntensity": "subtle",
      "verdictLanguage": "desaturated"
    }/*EDITMODE-END*/;
  </script>

  <script>
/* Particle network background.
   ~100 drifting points, connected by thin lines when within proximity threshold.
   Cursor exerts gentle gravity with orbital swirl; clicks emit a ripple.
   60fps, respects prefers-reduced-motion. */

(function () {
  const canvas = document.getElementById('particle-bg');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Tweakable
  const CONFIG = {
    count: 110,
    baseSpeed: 0.12,
    maxDist: 140,
    mouseRadius: 180,
    gravity: 0.00045,
    swirl: 0.00035,
    damping: 0.985,
    rippleLife: 900, // ms
    rippleRadius: 260,
    rippleForce: 2.0,
  };

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = canvas.clientWidth = window.innerWidth;
    H = canvas.clientHeight = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Particles
  const pts = [];
  function init() {
    pts.length = 0;
    for (let i = 0; i < CONFIG.count; i++) {
      pts.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * CONFIG.baseSpeed * 2,
        vy: (Math.random() - 0.5) * CONFIG.baseSpeed * 2,
        r: 0.8 + Math.random() * 1.4,
        hue: 70 + Math.random() * 20, // amber-ish
      });
    }
  }
  init();

  const mouse = { x: -9999, y: -9999, active: false };
  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX; mouse.y = e.clientY; mouse.active = true;
  });
  window.addEventListener('mouseleave', () => { mouse.active = false; });

  const ripples = [];
  window.addEventListener('click', e => {
    // Ignore clicks on interactive elements so ripples don't stack weirdly on button mashing
    ripples.push({ x: e.clientX, y: e.clientY, born: performance.now() });
    if (ripples.length > 6) ripples.shift();
  });

  const themeAccent = 'rgba(230, 180, 100,'; // amber-ish base
  const lineAccent  = 'rgba(210, 165, 95,';

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(32, now - last); last = now;
    ctx.clearRect(0, 0, W, H);

    // Update
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];

      // Mouse gravity + orbital swirl
      if (mouse.active) {
        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const d2 = dx*dx + dy*dy;
        const r = CONFIG.mouseRadius;
        if (d2 < r*r) {
          const d = Math.sqrt(d2) || 1;
          const f = (1 - d / r);
          // pull toward mouse
          p.vx += (dx / d) * f * CONFIG.gravity * dt;
          p.vy += (dy / d) * f * CONFIG.gravity * dt;
          // perpendicular swirl (counter-clockwise)
          p.vx += (-dy / d) * f * CONFIG.swirl * dt;
          p.vy += ( dx / d) * f * CONFIG.swirl * dt;
        }
      }

      // Ripples
      for (let k = 0; k < ripples.length; k++) {
        const rp = ripples[k];
        const age = now - rp.born;
        if (age > CONFIG.rippleLife) continue;
        const t = age / CONFIG.rippleLife;
        const radius = CONFIG.rippleRadius * t;
        const dx = p.x - rp.x;
        const dy = p.y - rp.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        const ringHalf = 40;
        if (Math.abs(dist - radius) < ringHalf) {
          const strength = (1 - t) * (1 - Math.abs(dist - radius)/ringHalf) * CONFIG.rippleForce;
          p.vx += (dx / dist) * strength * 0.03;
          p.vy += (dy / dist) * strength * 0.03;
        }
      }

      if (!reducedMotion) {
        p.x += p.vx;
        p.y += p.vy;
      }
      p.vx *= CONFIG.damping;
      p.vy *= CONFIG.damping;

      // Drift nudge to keep things lively
      if (Math.hypot(p.vx, p.vy) < 0.03) {
        p.vx += (Math.random() - 0.5) * 0.02;
        p.vy += (Math.random() - 0.5) * 0.02;
      }

      // Wrap
      if (p.x < -10) p.x = W + 10;
      if (p.x > W + 10) p.x = -10;
      if (p.y < -10) p.y = H + 10;
      if (p.y > H + 10) p.y = -10;
    }

    // Lines
    ctx.lineWidth = 0.6;
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i];
      for (let j = i + 1; j < pts.length; j++) {
        const b = pts[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < CONFIG.maxDist * CONFIG.maxDist) {
          const d = Math.sqrt(d2);
          const alpha = (1 - d / CONFIG.maxDist) * 0.28;
          ctx.strokeStyle = lineAccent + alpha.toFixed(3) + ')';
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    // Points
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      // Glow
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
      g.addColorStop(0, themeAccent + '0.55)');
      g.addColorStop(1, themeAccent + '0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
      ctx.fill();
      // Core
      ctx.fillStyle = themeAccent + '0.9)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Render ripple rings softly
    for (let k = 0; k < ripples.length; k++) {
      const rp = ripples[k];
      const age = now - rp.born;
      if (age > CONFIG.rippleLife) { ripples.splice(k, 1); k--; continue; }
      const t = age / CONFIG.rippleLife;
      const radius = CONFIG.rippleRadius * t;
      ctx.strokeStyle = `rgba(230,180,100,${(1 - t) * 0.22})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(rp.x, rp.y, radius, 0, Math.PI * 2);
      ctx.stroke();
    }

    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();

</script>
